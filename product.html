<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÉDIT MARKET PRO - Produit</title>

  <style>
    :root{
      --bg:#05050A;
      --card:rgba(17,24,39,0.6);
      --violet:#8B5CF6;
      --violet2:#A855F7;
      --text:#FFFFFF;
      --muted:#9CA3AF;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui,sans-serif;
    }

    body{
      background: radial-gradient(circle at top, #1a0b2e, var(--bg));
      color:var(--text);
    }

    nav{
      position:sticky;
      top:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
      background:rgba(5,5,10,0.7);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(139,92,246,0.2);
    }

    .logo{
      color:var(--violet);
      font-weight:bold;
    }

    .btn{
      padding:10px 14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--violet),var(--violet2));
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .container{
      padding:40px 20px;
      max-width:1100px;
      margin:auto;
    }

    .product{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:30px;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(139,92,246,0.2);
      border-radius:18px;
      padding:25px;
      backdrop-filter:blur(20px);
    }

    h1{
      color:var(--violet2);
      margin-bottom:10px;
    }

    .price{
      font-size:28px;
      color:var(--violet);
      margin:15px 0;
      font-weight:bold;
    }

    .muted{
      color:var(--muted);
      line-height:1.6;
    }

    .preview{
      height:250px;
      border-radius:14px;
      background:linear-gradient(135deg,rgba(139,92,246,0.3),rgba(168,85,247,0.2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:18px;
      color:white;
    }

    .features{
      margin-top:15px;
    }

    .features li{
      margin:8px 0;
      color:var(--muted);
    }

    @media(max-width:900px){
      .product{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">ÉDIT MARKET PRO</div>
  <button class="btn" onclick="goBack()">Retour</button>
</nav>

<div class="container">

  <div class="product">

    <!-- LEFT -->
    <div class="card">
      <div class="preview" id="previewBox">
        Aperçu du produit
      </div>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <h1 id="name">Chargement...</h1>

      <div class="price" id="price">0€</div>

      <p class="muted">
        Produit premium pour créateurs de contenu. Compatible avec les logiciels professionnels.
      </p>

      <ul class="features">
        <li>✔ Qualité professionnelle</li>
        <li>✔ Licence commerciale incluse</li>
        <li>✔ Téléchargement instantané</li>
      </ul>

      <button class="btn" style="margin-top:20px; width:100%;" onclick="buyNow()">
        Acheter maintenant
      </button>
    </div>

  </div>

</div>

<script>
  const productName = localStorage.getItem("selectedProduct");

  const database = {
    "Cinematic Intro Pack": {price:"12€"},
    "Premiere Pro LUT Bundle": {price:"9€"},
    "Glitch Transition Pack": {price:"14€"},
    "YouTube SFX Pack": {price:"7€"},
    "AE Title Pack": {price:"15€"}
  };

  const product = database[productName] || {price:"10€"};

  document.getElementById("name").innerText = productName || "Produit inconnu";
  document.getElementById("price").innerText = product.price;

  function buyNow(){
    localStorage.setItem("checkoutProduct", productName);
    localStorage.setItem("checkoutPrice", product.price);
    window.location.href="checkout.html";
  }

  function goBack(){
    window.location.href="products.html";
  }
</script>

</body>
</html>
