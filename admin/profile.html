<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Profil Administrateur</title>

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../css/style.css">

<style>
.profile-page{
    min-height:100vh;
    padding:30px;
}

.page-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
}

.profile-card{
    max-width:800px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:18px;
}

.form-group label{
    font-weight:600;
}

.form-group input,
.form-group textarea{
    background:#111827;
    color:white;
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;
    padding:12px;
}

.form-group textarea{
    resize:vertical;
    min-height:120px;
}

.save-btn{
    background:#7c3aed;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    font-weight:600;
}

.success-message{
    display:none;
    margin-top:15px;
    color:#22c55e;
}

@media(max-width:768px){

    .profile-page{
        padding:20px;
    }

}
</style>

</head>
<body>

<div class="profile-page">

    <div class="page-title">
        Profil Administrateur
    </div>

    <div class="profile-card">

        <div class="form-group">
            <label>Nom</label>
            <input type="text" id="adminName">
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="adminEmail">
        </div>

        <div class="form-group">
            <label>Biographie</label>
            <textarea id="adminBio"></textarea>
        </div>

        <button
            id="saveProfile"
            class="save-btn"
        >
            Enregistrer
        </button>

        <div
            id="successMessage"
            class="success-message"
        >
            Profil enregistré.
        </div>

    </div>

</div>

<script src="profile.js"></script>

</body>
</html>
