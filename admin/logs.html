<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Journaux</title>

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../css/style.css">

<style>
.logs-page{
    min-height:100vh;
    padding:30px;
}

.page-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
}

.logs-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:25px;
}

.logs-actions{
    display:flex;
    gap:15px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.action-btn{
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    font-weight:600;
    color:white;
    background:#7c3aed;
}

.delete-btn{
    background:#dc2626;
}

.logs-list{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.log-item{
    padding:12px;
    border-radius:12px;
    background:rgba(255,255,255,.05);
    word-break:break-word;
}

.empty-logs{
    text-align:center;
    padding:40px 20px;
}

@media(max-width:768px){

    .logs-page{
        padding:20px;
    }

}
</style>

</head>
<body>

<div class="logs-page">

    <div class="page-title">
        Journaux d'Activité
    </div>

    <div class="logs-card">

        <div class="logs-actions">

            <button
                id="refreshLogs"
                class="action-btn"
            >
                Actualiser
            </button>

            <button
                id="clearLogs"
                class="action-btn delete-btn"
            >
                Vider les journaux
            </button>

        </div>

        <div
            id="logsList"
            class="logs-list"
        ></div>

    </div>

</div>

<script src="logs.js"></script>

</body>
</html>
