<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÉDIT MARKET PRO — Orders</title>

  <style>
    :root{
      --bg:#05050A;
      --card:rgba(17,24,39,0.55);
      --stroke:rgba(255,255,255,0.08);
      --violet:#8B5CF6;
      --violet2:#A855F7;
      --text:#FFFFFF;
      --muted:#9CA3AF;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui;
    }

    body{
      background: radial-gradient(circle at top, #1a0b2e 0%, var(--bg) 40%);
      color:var(--text);
      min-height:100vh;
      padding:30px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .title{
      font-size:22px;
      font-weight:700;
    }

    .badge{
      padding:8px 14px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:rgba(139,92,246,0.1);
      color:var(--violet2);
      font-size:12px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:20px;
      backdrop-filter:blur(12px);
    }

    .filters{
      display:flex;
      gap:10px;
      margin-bottom:15px;
      flex-wrap:wrap;
    }

    select{
      padding:10px;
      border-radius:10px;
      border:1px solid var(--stroke);
      background:rgba(0,0,0,0.3);
      color:white;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      font-size:13px;
      text-align:left;
    }

    th{
      color:var(--muted);
    }

    .status{
      padding:4px 10px;
      border-radius:8px;
      font-size:12px;
      background:rgba(34,197,94,0.15);
      color:#22c55e;
      display:inline-block;
    }

    .pending{
      background:rgba(234,179,8,0.15);
      color:#eab308;
    }

  </style>
</head>

<body>

  <div class="header">
    <div class="title">📦 ÉDIT MARKET PRO — Orders</div>
    <div class="badge">Gestion des commandes</div>
  </div>

  <div class="card">

    <div class="filters">
      <select id="filterStatus" onchange="render()">
        <option value="all">Tous</option>
        <option value="validé">Validé</option>
        <option value="en attente">En attente</option>
      </select>
    </div>

    <table>
      <thead>
        <tr>
          <th>Client</th>
          <th>Email</th>
          <th>Produit</th>
          <th>Prix</th>
          <th>Date</th>
          <th>Statut</th>
        </tr>
      </thead>

      <tbody id="ordersTable"></tbody>
    </table>

  </div>

  <script>
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");

    function render(){
      const filter = document.getElementById("filterStatus").value;
      const table = document.getElementById("ordersTable");

      table.innerHTML = "";

      let filtered = orders;

      if(filter !== "all"){
        filtered = orders.filter(o => (o.status || "validé") === filter);
      }

      if(filtered.length === 0){
        table.innerHTML = `
          <tr>
            <td colspan="6" style="color:#9CA3AF;">Aucune commande</td>
          </tr>
        `;
        return;
      }

      filtered.forEach(o => {
        const tr = document.createElement("tr");

        const status = o.status || "validé";

        tr.innerHTML = `
          <td>${o.customer || "Client"}</td>
          <td>${o.email || "-"}</td>
          <td>${o.productName || o.product || "-"}</td>
          <td>${o.price || 0} €</td>
          <td>${o.date || new Date().toLocaleDateString()}</td>
          <td>
            <span class="status ${status === "en attente" ? "pending" : ""}">
              ${status}
            </span>
          </td>
        `;

        table.appendChild(tr);
      });
    }

    render();
  </script>

</body>
</html>
