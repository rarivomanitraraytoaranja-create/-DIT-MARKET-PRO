<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÉDIT MARKET PRO - Produits</title>

  <style>
    :root{
      --bg:#05050A;
      --card:rgba(17,24,39,0.6);
      --violet:#8B5CF6;
      --violet2:#A855F7;
      --text:#FFFFFF;
      --muted:#9CA3AF;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui,sans-serif;
    }

    body{
      background: radial-gradient(circle at top, #1a0b2e, var(--bg));
      color:var(--text);
    }

    nav{
      position:sticky;
      top:0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
      background:rgba(5,5,10,0.7);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(139,92,246,0.2);
      z-index:10;
    }

    .logo{
      color:var(--violet);
      font-weight:bold;
    }

    .btn{
      padding:10px 14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--violet),var(--violet2));
      color:white;
      cursor:pointer;
    }

    .container{
      padding:30px;
    }

    h1{
      margin-bottom:20px;
      color:var(--violet2);
    }

    /* SEARCH */
    .search-bar{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .search-bar input{
      flex:1;
      padding:12px;
      border-radius:12px;
      border:1px solid rgba(139,92,246,0.3);
      background:rgba(0,0,0,0.4);
      color:white;
      outline:none;
    }

    /* GRID */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:var(--card);
      padding:20px;
      border-radius:16px;
      border:1px solid rgba(139,92,246,0.2);
      backdrop-filter:blur(20px);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 0 25px rgba(139,92,246,0.3);
    }

    .price{
      color:var(--violet2);
      margin-top:10px;
      font-weight:bold;
    }

    .filters{
      display:flex;
      gap:10px;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .filter{
      padding:8px 12px;
      border-radius:10px;
      border:1px solid rgba(139,92,246,0.3);
      cursor:pointer;
      background:transparent;
      color:white;
      font-size:13px;
    }

    .filter.active{
      background:linear-gradient(135deg,var(--violet),var(--violet2));
    }
  </style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">ÉDIT MARKET PRO</div>
  <button class="btn" onclick="goHome()">Accueil</button>
</nav>

<div class="container">

  <h1>Tous les produits</h1>

  <!-- SEARCH -->
  <div class="search-bar">
    <input type="text" id="search" placeholder="Rechercher un produit..." onkeyup="renderProducts()"/>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter active" onclick="setFilter('all')">Tous</button>
    <button class="filter" onclick="setFilter('video')">Vidéo</button>
    <button class="filter" onclick="setFilter('motion')">Motion</button>
    <button class="filter" onclick="setFilter('luts')">LUTs</button>
    <button class="filter" onclick="setFilter('audio')">Audio</button>
  </div>

  <!-- GRID -->
  <div class="grid" id="grid"></div>

</div>

<script>
  let currentFilter = "all";

  const products = [
    {name:"Cinematic Intro Pack", price:"12€", category:"motion"},
    {name:"Premiere Pro LUT Bundle", price:"9€", category:"luts"},
    {name:"Glitch Transition Pack", price:"14€", category:"motion"},
    {name:"YouTube SFX Pack", price:"7€", category:"audio"},
    {name:"AE Title Pack", price:"15€", category:"video"},
    {name:"Film Color Grading LUTs", price:"11€", category:"luts"},
    {name:"Sound Effects Mega Pack", price:"10€", category:"audio"}
  ];

  function renderProducts(){
    const grid = document.getElementById("grid");
    const search = document.getElementById("search").value.toLowerCase();

    grid.innerHTML = "";

    const filtered = products.filter(p=>{
      const matchCategory = currentFilter === "all" || p.category === currentFilter;
      const matchSearch = p.name.toLowerCase().includes(search);
      return matchCategory && matchSearch;
    });

    filtered.forEach(p=>{
      const card = document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <h3>${p.name}</h3>
        <p style="opacity:.7">${p.category}</p>
        <div class="price">${p.price}</div>
        <button class="btn" style="margin-top:10px" onclick="openProduct('${p.name}')">
          Voir produit
        </button>
      `;
      grid.appendChild(card);
    });
  }

  function setFilter(f){
    currentFilter = f;

    document.querySelectorAll(".filter").forEach(btn=>{
      btn.classList.remove("active");
    });

    event.target.classList.add("active");
    renderProducts();
  }

  function openProduct(name){
    localStorage.setItem("selectedProduct", name);
    window.location.href="product.html";
  }

  function goHome(){
    window.location.href="index.html";
  }

  renderProducts();
</script>

</body>
</html>
