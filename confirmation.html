<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÉDIT MARKET PRO - Confirmation</title>

  <style>
    :root{
      --bg:#05050A;
      --violet:#8B5CF6;
      --violet2:#A855F7;
      --text:#FFFFFF;
      --muted:#9CA3AF;
      --card:rgba(17,24,39,0.6);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: radial-gradient(circle at top, #1a0b2e, var(--bg));
      color:var(--text);
      text-align:center;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(139,92,246,0.2);
      padding:40px;
      border-radius:20px;
      backdrop-filter:blur(20px);
      max-width:500px;
      width:90%;
      animation: fadeIn 1s ease;
    }

    h1{
      color:var(--violet2);
      margin-bottom:10px;
    }

    p{
      color:var(--muted);
      margin:8px 0;
    }

    .loader{
      margin:20px auto;
      width:60px;
      height:60px;
      border:4px solid rgba(139,92,246,0.2);
      border-top:4px solid var(--violet);
      border-radius:50%;
      animation: spin 1s linear infinite;
    }

    .btn{
      margin-top:20px;
      padding:12px 18px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--violet),var(--violet2));
      color:white;
      cursor:pointer;
      display:none;
    }

    @keyframes spin{
      0%{transform:rotate(0deg);}
      100%{transform:rotate(360deg);}
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(20px);}
      to{opacity:1;transform:translateY(0);}
    }

    .success{
      font-size:18px;
      color:#22c55e;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>⏳ Vérification du paiement</h1>

  <div class="loader" id="loader"></div>

  <p id="text">Validation de votre transaction Vanilla Pay...</p>

  <div class="success" id="success" style="display:none;">
    ✔ Paiement confirmé avec succès
  </div>

  <button class="btn" id="btn" onclick="goDownload()">
    Accéder au téléchargement
  </button>

</div>

<script>
  const order = JSON.parse(localStorage.getItem("lastOrder"));

  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("text").innerText="Commande validée";
    document.getElementById("success").style.display="block";
    document.getElementById("btn").style.display="inline-block";

    // mark order as confirmed
    if(order){
      order.status = "confirmed";
      localStorage.setItem("lastOrder", JSON.stringify(order));
    }

  }, 5000);

  function goDownload(){
    window.location.href="download.html";
  }
</script>

</body>
</html>
