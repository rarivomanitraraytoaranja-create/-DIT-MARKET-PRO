<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2>Checkout</h2>

<div id="items"></div>

<p>Total: <span id="total"></span></p>

<button onclick="pay()">Payer</button>

<script src="js/analytics.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("edit_cart")) || [];

function load(){
    let total = 0;
    let container = document.getElementById("items");

    cart.forEach(i => {
        total += i.price * i.quantity;
        container.innerHTML += `<p>${i.name} x${i.quantity}</p>`;
    });

    document.getElementById("total").innerText = total + " €";
}

function pay(){

    if(cart.length === 0){
        alert("Panier vide");
        return;
    }

    let orders = JSON.parse(localStorage.getItem("edit_orders")) || [];

    let total = cart.reduce((t,i)=>t+i.price*i.quantity,0);

    orders.push({
        id: "CMD-" + Date.now(),
        items: cart,
        total: total,
        date: new Date(),
        status: "paid"
    });

    localStorage.setItem("edit_orders", JSON.stringify(orders));
    localStorage.removeItem("edit_cart");

    trackPurchase();

    alert("Paiement réussi");
    window.location.href = "index.html";
}

document.addEventListener("DOMContentLoaded", load);
</script>

</body>
</html>
