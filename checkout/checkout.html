<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Base</title>

  <style>
    /* RESET */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f1a;
      color: white;
    }

    /* NAVBAR */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      background: #1a1a2e;
    }

    header h1 {
      font-size: 20px;
      color: #a855f7;
    }

    nav a {
      color: white;
      margin-left: 15px;
      text-decoration: none;
      transition: 0.3s;
    }

    nav a:hover {
      color: #a855f7;
    }

    /* HERO */
    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .hero h2 {
      font-size: 40px;
      color: #a855f7;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.8;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #a855f7;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #7c3aed;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 20px;
      background: #1a1a2e;
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <header>
    <h1>UI BASE</h1>
    <nav>
      <a href="#">Accueil</a>
      <a href="#">Produits</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h2>Bienvenue sur ton UI Base</h2>
    <p>Template simple pour démarrer ton site web rapidement</p>
    <button class="btn" onclick="alert('Bouton cliqué !')">
      Commencer
    </button>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 UI Base - Tous droits réservés
  </footer>

</body>
</html>
