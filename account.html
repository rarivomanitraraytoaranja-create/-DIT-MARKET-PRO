<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mon compte - ÉDIT MARKET PRO</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:0}
header{background:#111;color:#fff;padding:15px;text-align:center}
.container{max-width:900px;margin:40px auto;background:#fff;padding:20px;border-radius:10px}
.order{border-bottom:1px solid #ddd;padding:10px}
.status{color:green;font-weight:bold}
button{padding:10px;margin-top:10px;background:green;color:#fff;border:none;cursor:pointer}
</style>
</head>

<body>

<header>
    Mon compte
</header>

<div class="container">

    <h2>Historique des commandes</h2>

    <div id="orders"></div>

</div>

<script>
// ===============================
// CHARGER COMMANDES
// ===============================
let orders = JSON.parse(localStorage.getItem("edit_orders")) || [];

function loadOrders(){

    let container = document.getElementById("orders");
    container.innerHTML = "";

    if(orders.length === 0){
        container.innerHTML = "<p>Aucune commande</p>";
        return;
    }

    orders.forEach(o => {

        let div = document.createElement("div");
        div.className = "order";

        div.innerHTML = `
            <p><strong>ID :</strong> ${o.id}</p>
            <p><strong>Total :</strong> ${o.total} €</p>
            <p><strong>Date :</strong> ${o.date}</p>
            <p><strong>Status :</strong> <span class="status">${o.status}</span></p>

            <button onclick="viewOrder('${o.id}')">Voir détails</button>
        `;

        container.appendChild(div);
    });
}

// ===============================
// VOIR DÉTAILS
// ===============================
function viewOrder(id){

    let order = orders.find(o => o.id === id);

    if(!order) return;

    let text = "Commande " + id + "\n\n";

    order.items.forEach(i => {
        text += i.name + " x" + i.quantity + " = " + (i.price * i.quantity) + "€\n";
    });

    alert(text);
}

document.addEventListener("DOMContentLoaded", loadOrders);
</script>

</body>
</html>
