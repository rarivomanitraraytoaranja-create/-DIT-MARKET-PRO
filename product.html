<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produit</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h2 id="name">Produit exemple</h2>

<img id="img" src="assets/products/p1.jpg" width="100%">

<p>20 €</p>

<button onclick="addToCart()">Ajouter au panier</button>

<script src="js/analytics.js"></script>

<script>
trackProductView();

let product = {
    id: "P1",
    name: document.getElementById("name").innerText,
    price: 20,
    image: document.getElementById("img").src
};

function addToCart(){

    let cart = JSON.parse(localStorage.getItem("edit_cart")) || [];

    let exist = cart.find(p => p.id === product.id);

    if(exist){
        exist.quantity += 1;
    } else {
        cart.push({...product, quantity:1});
    }

    localStorage.setItem("edit_cart", JSON.stringify(cart));

    trackAddToCart();

    alert("Ajouté au panier");
}
</script>

</body>
</html>
