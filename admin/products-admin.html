<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÉDIT MARKET PRO — Products Admin</title>

  <style>
    :root{
      --bg:#05050A;
      --card:rgba(17,24,39,0.55);
      --stroke:rgba(255,255,255,0.08);
      --violet:#8B5CF6;
      --violet2:#A855F7;
      --text:#FFFFFF;
      --muted:#9CA3AF;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui;
    }

    body{
      background: radial-gradient(circle at top, #1a0b2e 0%, var(--bg) 40%);
      color:var(--text);
      min-height:100vh;
      padding:30px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .title{
      font-size:22px;
      font-weight:700;
    }

    .badge{
      padding:8px 14px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:rgba(139,92,246,0.1);
      color:var(--violet2);
      font-size:12px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1.5fr;
      gap:20px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:20px;
      backdrop-filter:blur(12px);
    }

    input, textarea, select{
      width:100%;
      padding:10px;
      margin-top:8px;
      margin-bottom:12px;
      border-radius:10px;
      border:1px solid var(--stroke);
      background:rgba(0,0,0,0.3);
      color:white;
      outline:none;
    }

    button{
      padding:10px 14px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      transition:0.3s;
    }

    .btn-primary{
      background:linear-gradient(90deg,var(--violet),var(--violet2));
      color:white;
    }

    .btn-danger{
      background:#ef4444;
      color:white;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      font-size:13px;
      text-align:left;
    }

    th{color:var(--muted);}

    .actions button{
      margin-right:5px;
    }

  </style>
</head>

<body>

  <div class="header">
    <div class="title">📦 ÉDIT MARKET PRO — Products Admin</div>
    <div class="badge">CRUD localStorage</div>
  </div>

  <div class="grid">

    <!-- FORM -->
    <div class="card">
      <h3>➕ Ajouter / Modifier Produit</h3>

      <input id="name" placeholder="Nom produit" />
      <input id="price" type="number" placeholder="Prix (€)" />
      <input id="category" placeholder="Catégorie" />
      <textarea id="desc" placeholder="Description"></textarea>
      <input id="image" placeholder="URL image" />

      <button class="btn-primary" onclick="saveProduct()">Enregistrer</button>
      <button class="btn-danger" onclick="resetForm()">Reset</button>
    </div>

    <!-- TABLE -->
    <div class="card">
      <h3>📋 Liste des produits</h3>

      <table>
        <thead>
          <tr>
            <th>Nom</th>
            <th>Prix</th>
            <th>Catégorie</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody id="productTable"></tbody>
      </table>
    </div>

  </div>

  <script>
    let products = JSON.parse(localStorage.getItem("products") || "[]");
    let editIndex = null;

    function render(){
      const table = document.getElementById("productTable");
      table.innerHTML = "";

      products.forEach((p, index) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${p.name}</td>
          <td>${p.price} €</td>
          <td>${p.category}</td>
          <td class="actions">
            <button onclick="editProduct(${index})">✏️</button>
            <button onclick="deleteProduct(${index})">🗑️</button>
          </td>
        `;

        table.appendChild(tr);
      });

      localStorage.setItem("products", JSON.stringify(products));
    }

    function saveProduct(){
      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;
      const category = document.getElementById("category").value;
      const desc = document.getElementById("desc").value;
      const image = document.getElementById("image").value;

      const product = { name, price, category, desc, image };

      if(editIndex !== null){
        products[editIndex] = product;
        editIndex = null;
      } else {
        products.push(product);
      }

      resetForm();
      render();
    }

    function editProduct(i){
      const p = products[i];
      document.getElementById("name").value = p.name;
      document.getElementById("price").value = p.price;
      document.getElementById("category").value = p.category;
      document.getElementById("desc").value = p.desc;
      document.getElementById("image").value = p.image;
      editIndex = i;
    }

    function deleteProduct(i){
      products.splice(i,1);
      render();
    }

    function resetForm(){
      document.getElementById("name").value = "";
      document.getElementById("price").value = "";
      document.getElementById("category").value = "";
      document.getElementById("desc").value = "";
      document.getElementById("image").value = "";
      editIndex = null;
    }

    render();
  </script>

</body>
</html>
