<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Clients</title>

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../css/style.css">

<style>
.customers-page{
    min-height:100vh;
    padding:30px;
}

.page-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
}

.customers-container{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    overflow:hidden;
}

.customers-table{
    width:100%;
    border-collapse:collapse;
}

.customers-table th,
.customers-table td{
    padding:16px;
    text-align:left;
}

.customers-table th{
    background:rgba(255,255,255,.05);
}

.customers-table tr:not(:last-child){
    border-bottom:1px solid rgba(255,255,255,.08);
}

.empty-customers{
    text-align:center;
    padding:60px 20px;
}

@media(max-width:768px){

    .customers-page{
        padding:20px;
    }

    .customers-container{
        overflow-x:auto;
    }

    .customers-table{
        min-width:800px;
    }

}
</style>

</head>
<body>

<div class="customers-page">

    <div class="page-title">
        Gestion des Clients
    </div>

    <div class="customers-container">

        <table class="customers-table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Email</th>
                    <th>Téléphone</th>
                    <th>Commandes</th>
                    <th>Dépenses</th>
                </tr>
            </thead>

            <tbody id="customersTable"></tbody>

        </table>

    </div>

</div>

<script src="customers.js"></script>

</body>
</html>
