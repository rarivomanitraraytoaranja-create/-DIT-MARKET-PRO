<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Sécurité</title>

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../css/style.css">

<style>
.security-page{
    min-height:100vh;
    padding:30px;
}

.page-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
}

.security-grid{
    display:grid;
    gap:20px;
}

.security-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:25px;
}

.card-title{
    font-size:1.2rem;
    font-weight:700;
    margin-bottom:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-bottom:15px;
}

.form-group input{
    background:#111827;
    color:white;
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;
    padding:12px;
}

.save-btn{
    background:#7c3aed;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    font-weight:600;
}

.success-message{
    display:none;
    margin-top:15px;
    color:#22c55e;
}

@media(max-width:768px){

    .security-page{
        padding:20px;
    }

}
</style>

</head>
<body>

<div class="security-page">

    <div class="page-title">
        Sécurité Administration
    </div>

    <div class="security-grid">

        <div class="security-card">

            <div class="card-title">
                Mot de passe administrateur
            </div>

            <div class="form-group">
                <label>Nouveau mot de passe</label>
                <input type="password" id="adminPassword">
            </div>

            <button id="savePassword" class="save-btn">
                Enregistrer
            </button>

            <div id="successMessage" class="success-message">
                Mot de passe enregistré.
            </div>

        </div>

    </div>

</div>

<script src="security.js"></script>

</body>
</html>
