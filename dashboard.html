<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f1a;
    color:white;
}

header{
    background:#1a1a2e;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.card{
    background:#1a1a2e;
    padding:15px;
    margin-bottom:20px;
    border-radius:10px;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:5px 0;
}

button{
    padding:10px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
}

.product{
    background:#111;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<header>
    DASHBOARD ADMIN - ÉDIT MARKET PRO
</header>

<div class="container">

<!-- AJOUT PRODUIT -->
<div class="card">
    <h2>Ajouter produit</h2>

    <input type="text" id="name" placeholder="Nom produit">
    <input type="number" id="price" placeholder="Prix">
    <textarea id="desc" placeholder="Description"></textarea>
    <input type="text" id="img" placeholder="URL image">
    <input type="text" id="video" placeholder="URL vidéo (optionnel)">
    <input type="text" id="link" placeholder="Lien téléchargement (Drive)">

    <button onclick="addProduct()">Ajouter</button>
</div>

<!-- LISTE -->
<div class="card">
    <h2>Produits</h2>
    <div id="list"></div>
</div>

</div>

<script>
// sécurité simple
if(localStorage.getItem("auth") !== "true"){
    window.location.href = "admin/login.html";
}

let products = JSON.parse(localStorage.getItem("products")) || [];

function addProduct(){
    let p = {
        id: Date.now(),
        name: name.value,
        price: price.value,
        desc: desc.value,
        img: img.value,
        video: video.value,
        link: link.value
    };

    products.push(p);
    localStorage.setItem("products", JSON.stringify(products));

    render();
}

function render(){
    list.innerHTML = "";

    products.forEach(p=>{
        list.innerHTML += `
        <div class="product">
            <h3>${p.name}</h3>
            <p>${p.desc}</p>
            <p>💰 ${p.price} Ar</p>

            ${p.img ? `<img src="${p.img}" width="100">` : ""}
            ${p.video ? `<video src="${p.video}" width="200" controls></video>` : ""}

            <br><a href="${p.link}" target="_blank">⬇ Télécharger</a>
        </div>
        `;
    });
}

render();
</script>

</body>
</html>
