<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Téléchargements</title>

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../css/style.css">

<style>
.downloads-page{
    min-height:100vh;
    padding:30px;
}

.page-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
}

.downloads-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.download-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    overflow:hidden;
}

.download-image{
    width:100%;
    height:220px;
    object-fit:cover;
}

.download-content{
    padding:20px;
}

.download-title{
    font-size:1.2rem;
    font-weight:700;
    margin-bottom:10px;
}

.download-category{
    color:#bdbdbd;
    margin-bottom:10px;
}

.download-link{
    width:100%;
    margin-top:15px;
    border:none;
    border-radius:12px;
    padding:12px;
    background:#7c3aed;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.empty-state{
    text-align:center;
    padding:80px 20px;
    opacity:.8;
}

@media(max-width:768px){
    .downloads-page{
        padding:20px;
    }
}
</style>

</head>
<body>

<div class="downloads-page">

    <div class="page-title">
        Gestion des Téléchargements
    </div>

    <div id="downloadsGrid" class="downloads-grid"></div>

</div>

<script src="downloads.js"></script>

</body>
</html>
