<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Gestion Produits</title>

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../css/style.css">

<style>
.products-page{
    min-height:100vh;
    padding:30px;
}

.products-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.products-title{
    font-size:2rem;
    font-weight:700;
}

.add-product-btn{
    background:#7c3aed;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:12px;
    cursor:pointer;
    font-weight:600;
}

.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:20px;
}

.product-card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
}

.product-image{
    width:100%;
    height:220px;
    object-fit:cover;
}

.product-content{
    padding:20px;
}

.product-name{
    font-size:1.2rem;
    font-weight:700;
    margin-bottom:10px;
}

.product-category{
    color:#bdbdbd;
    margin-bottom:10px;
}

.product-price{
    color:#8b5cf6;
    font-size:1.3rem;
    font-weight:700;
    margin-bottom:15px;
}

.product-actions{
    display:flex;
    gap:10px;
}

.edit-btn,
.delete-btn{
    flex:1;
    border:none;
    border-radius:10px;
    padding:10px;
    cursor:pointer;
    font-weight:600;
}

.edit-btn{
    background:#7c3aed;
    color:white;
}

.delete-btn{
    background:#dc2626;
    color:white;
}

.empty-products{
    text-align:center;
    padding:80px 20px;
    opacity:.8;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
    padding:20px;
}

.modal.active{
    display:flex;
}

.modal-box{
    width:100%;
    max-width:700px;
    background:#111827;
    border-radius:20px;
    padding:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:8px;
}

.form-group.full{
    grid-column:1/-1;
}

.form-group input,
.form-group textarea,
.form-group select{
    background:#1f2937;
    border:1px solid #374151;
    color:white;
    padding:12px;
    border-radius:10px;
}

.form-group textarea{
    min-height:120px;
    resize:vertical;
}

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:20px;
}

.cancel-btn,
.save-btn{
    border:none;
    border-radius:10px;
    padding:12px 20px;
    cursor:pointer;
    font-weight:600;
}

.cancel-btn{
    background:#374151;
    color:white;
}

.save-btn{
    background:#7c3aed;
    color:white;
}

@media(max-width:768px){

    .products-page{
        padding:20px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

}
</style>

</head>
<body>

<div class="products-page">

    <div class="products-header">
        <div class="products-title">
            Gestion des Produits
        </div>

        <button id="openModalBtn" class="add-product-btn">
            Ajouter un produit
        </button>
    </div>

    <div id="productsContainer" class="products-grid"></div>

</div>

<div id="productModal" class="modal">

    <div class="modal-box">

        <div class="form-grid">

            <div class="form-group">
                <label>Nom</label>
                <input type="text" id="productName">
            </div>

            <div class="form-group">
                <label>Prix</label>
                <input type="number" id="productPrice">
            </div>

            <div class="form-group">
                <label>Catégorie</label>
                <input type="text" id="productCategory">
            </div>

            <div class="form-group">
                <label>Image</label>
                <input type="text" id="productImage">
            </div>

            <div class="form-group full">
                <label>Description</label>
                <textarea id="productDescription"></textarea>
            </div>

            <div class="form-group full">
                <label>Lien de téléchargement</label>
                <input type="text" id="productDownload">
            </div>

        </div>

        <div class="modal-actions">
            <button id="cancelModal" class="cancel-btn">
                Annuler
            </button>

            <button id="saveProduct" class="save-btn">
                Enregistrer
            </button>
        </div>

    </div>

</div>

<script src="admin.js"></script>

</body>
</html>
