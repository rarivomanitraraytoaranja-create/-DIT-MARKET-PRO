<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÉDIT MARKET PRO — Analytics</title>

  <style>
    :root{
      --bg:#05050A;
      --card:rgba(17,24,39,0.55);
      --stroke:rgba(255,255,255,0.08);
      --violet:#8B5CF6;
      --violet2:#A855F7;
      --text:#FFFFFF;
      --muted:#9CA3AF;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui;
    }

    body{
      background: radial-gradient(circle at top, #1a0b2e 0%, var(--bg) 40%);
      color:var(--text);
      min-height:100vh;
      padding:30px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:25px;
    }

    .title{
      font-size:22px;
      font-weight:700;
    }

    .badge{
      padding:8px 14px;
      border-radius:12px;
      border:1px solid var(--stroke);
      background:rgba(139,92,246,0.1);
      color:var(--violet2);
      font-size:12px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:20px;
      backdrop-filter:blur(12px);
      box-shadow:0 0 25px rgba(139,92,246,0.08);
    }

    .label{
      color:var(--muted);
      font-size:12px;
    }

    .value{
      font-size:24px;
      font-weight:700;
      margin-top:10px;
    }

    .chart-box{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:18px;
      padding:20px;
      backdrop-filter:blur(12px);
      margin-top:20px;
    }

    .bar-container{
      margin-top:15px;
    }

    .bar{
      height:14px;
      background:rgba(255,255,255,0.06);
      border-radius:10px;
      overflow:hidden;
      margin-bottom:10px;
    }

    .bar > div{
      height:100%;
      background:linear-gradient(90deg, var(--violet), var(--violet2));
      width:0%;
      border-radius:10px;
      transition:1s;
    }

    .bar-label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }

  </style>
</head>

<body>

  <div class="header">
    <div class="title">📈 ÉDIT MARKET PRO — Analytics</div>
    <div class="badge">Real-time localStorage stats</div>
  </div>

  <!-- GLOBAL STATS -->
  <div class="grid">
    <div class="card">
      <div class="label">💰 Revenus totaux</div>
      <div class="value" id="revenue">0 €</div>
    </div>

    <div class="card">
      <div class="label">🛒 Commandes</div>
      <div class="value" id="orders">0</div>
    </div>

    <div class="card">
      <div class="label">📦 Produits</div>
      <div class="value" id="products">0</div>
    </div>

    <div class="card">
      <div class="label">📊 Conversion</div>
      <div class="value" id="conversion">0%</div>
    </div>
  </div>

  <!-- SALES BY PRODUCT -->
  <div class="chart-box">
    <h3>📦 Ventes par produit</h3>
    <div id="productBars" class="bar-container"></div>
  </div>

  <!-- DAILY REVENUE -->
  <div class="chart-box">
    <h3>📅 Revenus simulés (7 jours)</h3>
    <div id="dailyBars" class="bar-container"></div>
  </div>

  <script>
    const orders = JSON.parse(localStorage.getItem("orders") || "[]");
    const products = JSON.parse(localStorage.getItem("products") || "[]");

    // 💰 REVENUE TOTAL
    const revenue = orders.reduce((sum, o) => sum + Number(o.price || 0), 0);

    document.getElementById("revenue").innerText = revenue + " €";
    document.getElementById("orders").innerText = orders.length;
    document.getElementById("products").innerText = products.length;

    const conversion = products.length
      ? ((orders.length / (products.length * 10)) * 100).toFixed(1)
      : 0;

    document.getElementById("conversion").innerText = conversion + "%";

    // 📦 SALES BY PRODUCT
    const productStats = {};

    orders.forEach(o => {
      const name = o.productName || o.product || "Produit";
      productStats[name] = (productStats[name] || 0) + 1;
    });

    const productBars = document.getElementById("productBars");

    Object.entries(productStats).forEach(([name, count]) => {
      const percent = Math.min(100, count * 20);

      const wrap = document.createElement("div");
      wrap.innerHTML = `
        <div class="bar-label">${name} (${count})</div>
        <div class="bar"><div style="width:${percent}%"></div></div>
      `;
      productBars.appendChild(wrap);
    });

    // 📅 DAILY REVENUE SIMULATION
    const dailyBars = document.getElementById("dailyBars");

    const days = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

    days.forEach(day => {
      const value = Math.floor(Math.random() * 1000) + 200;
      const percent = (value / 1200) * 100;

      const wrap = document.createElement("div");
      wrap.innerHTML = `
        <div class="bar-label">${day} — ${value} €</div>
        <div class="bar"><div style="width:${percent}%"></div></div>
      `;
      dailyBars.appendChild(wrap);
    });

  </script>

</body>
</html>
