<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard - ÉDIT MARKET PRO</title>

<link rel="stylesheet" href="../css/style.css">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:0}
header{background:#111;color:#fff;padding:15px;text-align:center}

.container{max-width:1100px;margin:30px auto;padding:20px;background:#fff;border-radius:10px}

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:30px}

.card{background:#222;color:#fff;padding:20px;border-radius:10px;text-align:center}

h2{margin-top:30px}

canvas{width:100%!important;max-height:400px}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header>
    ADMIN DASHBOARD
</header>

<div class="container">

    <h2>📊 Statistiques globales</h2>

    <div class="cards">
        <div class="card">
            <h3 id="visits">0</h3>
            <p>Visites</p>
        </div>

        <div class="card">
            <h3 id="views">0</h3>
            <p>Produits vus</p>
        </div>

        <div class="card">
            <h3 id="cart">0</h3>
            <p>Ajouts panier</p>
        </div>

        <div class="card">
            <h3 id="sales">0</h3>
            <p>Ventes</p>
        </div>
    </div>

    <h2>📈 Graphique activité</h2>
    <canvas id="chart"></canvas>

</div>

<script>
// ===============================
// LOAD ANALYTICS
// ===============================
let analytics = JSON.parse(localStorage.getItem("edit_analytics")) || {
    visits: 0,
    productViews: 0,
    cartAdds: 0,
    purchases: 0
};

document.getElementById("visits").innerText = analytics.visits;
document.getElementById("views").innerText = analytics.productViews;
document.getElementById("cart").innerText = analytics.cartAdds;
document.getElementById("sales").innerText = analytics.purchases;

// ===============================
// CHART
// ===============================
const ctx = document.getElementById("chart");

new Chart(ctx, {
    type: "bar",
    data: {
        labels: ["Visites", "Vues produits", "Panier", "Achats"],
        datasets: [{
            label: "Activité",
            data: [
                analytics.visits,
                analytics.productViews,
                analytics.cartAdds,
                analytics.purchases
            ],
            backgroundColor: ["blue","green","orange","red"]
        }]
    }
});
</script>

</body>
</html>
