<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ÉDIT MARKET PRO - Wishlist</title>

  <style>
    :root{
      --bg:#05050A;
      --violet:#8B5CF6;
      --violet2:#A855F7;
      --text:#FFFFFF;
      --muted:#9CA3AF;
      --card:rgba(17,24,39,0.6);
      --red:#ef4444;
      --green:#22c55e;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Inter,system-ui,sans-serif;
    }

    body{
      background: radial-gradient(circle at top, #1a0b2e, var(--bg));
      color:var(--text);
    }

    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 25px;
      background:rgba(5,5,10,0.7);
      backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(139,92,246,0.2);
      position:sticky;
      top:0;
    }

    .logo{
      color:var(--violet);
      font-weight:bold;
    }

    .btn{
      padding:10px 14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(135deg,var(--violet),var(--violet2));
      color:white;
      cursor:pointer;
    }

    .container{
      max-width:900px;
      margin:auto;
      padding:30px 20px;
    }

    h1{
      color:var(--violet2);
      margin-bottom:20px;
    }

    .card{
      background:var(--card);
      border:1px solid rgba(139,92,246,0.2);
      padding:20px;
      border-radius:16px;
      backdrop-filter:blur(20px);
      margin-bottom:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .name{
      font-weight:bold;
    }

    .price{
      color:var(--violet2);
      margin-top:5px;
    }

    .actions{
      display:flex;
      gap:10px;
    }

    .remove{
      background:rgba(239,68,68,0.2);
      border:1px solid rgba(239,68,68,0.4);
    }

    .buy{
      background:linear-gradient(135deg,var(--green),#16a34a);
    }

    .empty{
      text-align:center;
      color:var(--muted);
      margin-top:50px;
    }
  </style>
</head>

<body>

<nav>
  <div class="logo">ÉDIT MARKET PRO</div>
  <button class="btn" onclick="goHome()">Accueil</button>
</nav>

<div class="container">

  <h1>❤️ Ma Wishlist</h1>

  <div id="list"></div>

</div>

<script>
  const user = JSON.parse(localStorage.getItem("userSession"));

  if(!user){
    window.location.href="login.html";
  }

  let wishlist = JSON.parse(localStorage.getItem("wishlist") || "[]");

  const prices = {
    "Cinematic Intro Pack":"12€",
    "Premiere Pro LUT Bundle":"9€",
    "Glitch Transition Pack":"14€",
    "YouTube SFX Pack":"7€",
    "AE Title Pack":"15€"
  };

  const list = document.getElementById("list");

  function render(){

    list.innerHTML = "";

    if(wishlist.length === 0){
      list.innerHTML = `<p class="empty">Aucun produit dans la wishlist</p>`;
      return;
    }

    wishlist.forEach((item,index)=>{

      const div = document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <div>
          <div class="name">❤️ ${item}</div>
          <div class="price">${prices[item] || "10€"}</div>
        </div>

        <div class="actions">
          <button class="btn buy" onclick="buy('${item}')">Acheter</button>
          <button class="btn remove" onclick="removeItem(${index})">Supprimer</button>
        </div>
      `;

      list.appendChild(div);
    });
  }

  function removeItem(i){
    wishlist.splice(i,1);
    localStorage.setItem("wishlist", JSON.stringify(wishlist));
    render();
  }

  function buy(item){
    localStorage.setItem("checkoutProduct", item);
    localStorage.setItem("checkoutPrice", prices[item] || "10€");
    window.location.href="checkout.html";
  }

  function goHome(){
    window.location.href="index.html";
  }

  render();
</script>

</body>
</html>
