<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ÉDIT MARKET PRO - Rapports</title>

<link rel="stylesheet" href="admin.css">
<link rel="stylesheet" href="../css/style.css">

<style>
.reports-page{
    min-height:100vh;
    padding:30px;
}

.page-title{
    font-size:2rem;
    font-weight:700;
    margin-bottom:30px;
}

.reports-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.report-card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:25px;
}

.report-title{
    font-size:1.2rem;
    font-weight:700;
    margin-bottom:15px;
}

.report-text{
    opacity:.85;
    line-height:1.6;
    margin-bottom:20px;
}

.report-btn{
    background:#7c3aed;
    color:white;
    border:none;
    border-radius:12px;
    padding:12px 20px;
    cursor:pointer;
    font-weight:600;
}

@media(max-width:768px){

    .reports-page{
        padding:20px;
    }

}
</style>

</head>
<body>

<div class="reports-page">

    <div class="page-title">
        Rapports
    </div>

    <div class="reports-grid">

        <div class="report-card">

            <div class="report-title">
                Rapport Produits
            </div>

            <div class="report-text">
                Génération d'un rapport complet des produits enregistrés.
            </div>

            <button
                id="productsReport"
                class="report-btn"
            >
                Générer
            </button>

        </div>

        <div class="report-card">

            <div class="report-title">
                Rapport Commandes
            </div>

            <div class="report-text">
                Génération d'un rapport des commandes enregistrées.
            </div>

            <button
                id="ordersReport"
                class="report-btn"
            >
                Générer
            </button>

        </div>

        <div class="report-card">

            <div class="report-title">
                Rapport Paiements
            </div>

            <div class="report-text">
                Génération d'un rapport des paiements.
            </div>

            <button
                id="paymentsReport"
                class="report-btn"
            >
                Générer
            </button>

        </div>

    </div>

</div>

<script src="reports.js"></script>

</body>
</html>
